<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Das Residency - Admin Dashboard</title>
    <link rel="stylesheet" href="index.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .dashboard-container {
            max-width: 1200px;
            width: 100%;
        }

        .survey-card {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .survey-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-top: 1rem;
        }

        .data-point {
            background: rgba(0, 0, 0, 0.2);
            padding: 0.8rem;
            border-radius: 8px;
        }

        .data-label {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 0.3rem;
        }

        .data-value {
            font-weight: 600;
            color: var(--primary);
        }

        .comments {
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            font-style: italic;
        }

        .nav-links {
            text-align: center;
            margin-top: 2rem;
        }

        .nav-links a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }

        .nav-links a:hover {
            text-decoration: underline;
        }

        .empty-state {
            text-align: center;
            padding: 3rem;
            color: var(--text-secondary);
        }
    </style>
</head>

<body>
    <div class="survey-container dashboard-container">
        <div class="survey-header">
            <div class="logo-placeholder">DR</div>
            <h1>Admin Dashboard</h1>
            <p>View all submitted customer feedback below</p>

            <div
                style="margin-top: 2rem; display: flex; flex-direction: column; align-items: center; background: rgba(0,0,0,0.2); padding: 1.5rem; border-radius: 12px; border: 1px dashed var(--primary); max-width: 300px; margin-left: auto; margin-right: auto;">
                <p style="margin-bottom: 0.5rem; color: var(--primary); font-weight: 600;">Customer Scan Code</p>
                <img id="qr-code-img" src="" alt="QR Code"
                    style="background: white; padding: 10px; border-radius: 8px; width: 150px; height: 150px;" />
                <p style="font-size: 0.8rem; margin-top: 0.5rem; color: var(--text-secondary);">Ask customers to scan to
                    open survey</p>
            </div>
        </div>

        <script>
            window.addEventListener('DOMContentLoaded', () => {
                const surveyUrl = window.location.origin + "/index.html";
                document.getElementById('qr-code-img').src = `https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=${encodeURIComponent(surveyUrl)}`;
            });
        </script>

        <div id="surveyList">
            <!-- Surveys will be injected here via JS -->
        </div>

        <div class="nav-links">
            <a href="/">← Back to Survey Form</a>
            <br><br>
            <button id="clearDataBtn" class="outline-btn" style="border-color: var(--error); color: var(--error);">Clear
                All Data</button>
        </div>
    </div>

    <script type="module">
        // 1. Remove Firebase imports
        // import { ... } from "...firebase-firestore.js";

        document.addEventListener('DOMContentLoaded', () => {
            const surveyList = document.getElementById('surveyList');

            async function loadSurveys() {
                try {
                    // CHANGE: Fetch from your own API
                    const response = await fetch('/api/get-surveys');
                    const result = await response.json();
                    const existingSurveys = result.data || [];

                    if (existingSurveys.length === 0) {
                        surveyList.innerHTML = '<div class="empty-state">No surveys submitted yet.</div>';
                        return;
                    }

                    // The rest of your HTML building logic remains the same...
                    let html = '';
                    existingSurveys.forEach((survey) => {
                        const date = new Date(survey.timestamp).toLocaleString();
                        html += `
                    <div class="survey-card">
                        <h3>Survey Room #${survey.roomnumber}</h3>
                        <p>Cleanliness: ${survey.cleanliness} / 5</p>
                        <p>Comments: ${survey.suggestions || 'None'}</p>
                    </div>`;
                    });
                    surveyList.innerHTML = html;
                } catch (error) {
                    surveyList.innerHTML = '<div class="empty-state">Error loading data.</div>';
                }
            }
            loadSurveys();
        });
    </script>
</body>

</html>
