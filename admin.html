<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Das Residency - Admin Dashboard</title>
    <link rel="stylesheet" href="index.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .dashboard-container {
            max-width: 1200px;
            width: 100%;
        }

        .survey-card {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .survey-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-top: 1rem;
        }

        .data-point {
            background: rgba(0, 0, 0, 0.2);
            padding: 0.8rem;
            border-radius: 8px;
        }

        .data-label {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 0.3rem;
        }

        .data-value {
            font-weight: 600;
            color: var(--primary);
        }

        .comments {
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            font-style: italic;
        }

        .nav-links {
            text-align: center;
            margin-top: 2rem;
        }

        .nav-links a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }

        .nav-links a:hover {
            text-decoration: underline;
        }

        .empty-state {
            text-align: center;
            padding: 3rem;
            color: var(--text-secondary);
        }
    </style>
</head>

<body>
    <div class="survey-container dashboard-container">
        <div class="survey-header">
            <div class="logo-placeholder">DR</div>
            <h1>Admin Dashboard</h1>
            <p>View all submitted customer feedback below</p>

            <div
                style="margin-top: 2rem; display: flex; flex-direction: column; align-items: center; background: rgba(0,0,0,0.2); padding: 1.5rem; border-radius: 12px; border: 1px dashed var(--primary); max-width: 300px; margin-left: auto; margin-right: auto;">
                <p style="margin-bottom: 0.5rem; color: var(--primary); font-weight: 600;">Customer Scan Code</p>
                <img id="qr-code-img" src="" alt="QR Code"
                    style="background: white; padding: 10px; border-radius: 8px; width: 150px; height: 150px;" />
                <p style="font-size: 0.8rem; margin-top: 0.5rem; color: var(--text-secondary);">Ask customers to scan to
                    open survey</p>
            </div>
        </div>

        <script>
            window.addEventListener('DOMContentLoaded', () => {
                const surveyUrl = window.location.origin + "/index.html";
                document.getElementById('qr-code-img').src = `https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=${encodeURIComponent(surveyUrl)}`;
            });
        </script>

        <div id="surveyList">
            <!-- Surveys will be injected here via JS -->
        </div>

        <div class="nav-links">
            <a href="/">← Back to Survey Form</a>
            <br><br>
            <button id="clearDataBtn" class="outline-btn" style="border-color: var(--error); color: var(--error);">Clear
                All Data</button>
        </div>
    </div>

    <script type="module">
        document.addEventListener('DOMContentLoaded', () => {
            const surveyList = document.getElementById('surveyList');

            async function loadSurveys() {
                try {
                    // Fetching from your Vercel/Neon API
                    const response = await fetch('/api/get-surveys');
                    const result = await response.json();
                    const existingSurveys = result.data || [];

                    if (existingSurveys.length === 0) {
                        surveyList.innerHTML = '<div class="empty-state">No surveys submitted yet.</div>';
                        return;
                    }

                    let html = '';
                    existingSurveys.forEach((survey) => {
                        // Format the timestamp for better readability
                        const date = new Date(survey.timestamp).toLocaleString('en-IN', {
                            dateStyle: 'medium',
                            timeStyle: 'short'
                        });

                        html += `
                    <div class="survey-card">
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 0.5rem;">
                            <h3 style="margin: 0; color: var(--primary);">Room #${survey.roomnumber || 'N/A'}</h3>
                            <span style="font-size: 0.8rem; color: var(--text-secondary);">${date}</span>
                        </div>

                        <div class="survey-grid">
                            <div class="data-point">
                                <div class="data-label">Cleanliness</div>
                                <div class="data-value">${survey.cleanliness} / 5</div>
                            </div>
                            <div class="data-point">
                                <div class="data-label">Hygiene</div>
                                <div class="data-value">${survey.hygiene} / 5</div>
                            </div>
                            <div class="data-point">
                                <div class="data-label">Manager Behaviour</div>
                                <div class="data-value">${survey.managerbehaviour} / 5</div>
                            </div>
                            <div class="data-point">
                                <div class="data-label">Room Boy Behaviour</div>
                                <div class="data-value">${survey.roomboybehaviour} / 5</div>
                            </div>
                        </div>

                        <div class="survey-grid" style="margin-top: 1rem; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 1rem;">
                            <div class="data-point">
                                <div class="data-label">Rent Paid</div>
                                <div class="data-value">₹${survey.roomrent}</div>
                            </div>
                            <div class="data-point">
                                <div class="data-label">Amount Received</div>
                                <div class="data-value">₹${survey.amountpaid}</div>
                            </div>
                            <div class="data-point">
                                <div class="data-label">Payment Method</div>
                                <div class="data-value" style="text-transform: uppercase;">${survey.paymenttype}</div>
                            </div>
                             <div class="data-point">
                                <div class="data-label">Extra Charges</div>
                                <div class="data-value">${survey.extracharges || 'None'}</div>
                            </div>
                        </div>

                        <div class="comments">
                            <div class="data-label" style="font-style: normal; margin-bottom: 0.5rem;">Guest Suggestions:</div>
                            "${survey.suggestions || 'No suggestions provided.'}"
                        </div>
                    </div>`;
                    });

                    surveyList.innerHTML = html;
                } catch (error) {
                    console.error("Dashboard Load Error:", error);
                    surveyList.innerHTML = '<div class="empty-state">Error loading data from Neon. Check browser console.</div>';
                }
            }

            loadSurveys();

            // Optional: Clear Data button logic (Requires a DELETE API route to be safe)
            document.getElementById('clearDataBtn').addEventListener('click', () => {
                if (confirm("To delete data, you should manage it directly in the Neon Console for security. Proceed anyway?")) {
                    alert("Please use the Neon Dashboard to drop/truncate the table for safety.");
                }
            });
        });
    </script>
</body>

</html>
